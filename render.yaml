services:
  - type: web
    name: canvas-teams-api
    runtime: python
    pythonVersion: 3.12
    plan: standard

    # Directorio raíz del proyecto
    rootDir: .

    # Comando para instalar dependencias
    buildCommand: pip install -r requirements.txt

    # Comando para iniciar la aplicación
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT

    # Puerto
    envVars:
      - key: PORT
        value: 3000
      - key: ENVIRONMENT
        value: production

      # Canvas LMS - REEMPLAZAR CON TUS VALORES
      - key: CANVAS_BASE_URL
        sync: false
      - key: CANVAS_ACCESS_TOKEN
        sync: false
      - key: CANVAS_ACCOUNT_ID
        value: "1"

      # Azure/Microsoft Entra - REEMPLAZAR CON TUS VALORES
      - key: AZURE_TENANT_ID
        sync: false
      - key: AZURE_CLIENT_ID
        sync: false
      - key: AZURE_CLIENT_SECRET
        sync: false
      - key: AZURE_SKU_STUDENTS
        value: STANDARDWOFFPACK_STUDENT
      - key: AZURE_SKU_TEACHERS
        value: STANDARDWOFFPACK_FACULTY

      # Institucional - REEMPLAZAR CON TUS VALORES
      - key: INSTITUTIONAL_DOMAIN
        value: usil.edu.py
      - key: USAGE_LOCATION
        value: PY
      - key: TEAMS_URL
        value: https://teams.microsoft.com

      # SMTP (opcional) - REEMPLAZAR CON TUS VALORES O DEJAR VACÍO
      - key: SMTP_HOST
        value: smtp.office365.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_TLS
        value: "true"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_FROM
        value: no-reply@usil.edu.py

    # Directorio de caché
    buildCache: pip_modules

    # Región (opcional - dejar comentado para usar default)
    # region: ohio
